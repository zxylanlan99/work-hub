<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyMind - AI驱动的学习管理平台</title>
  <link rel="stylesheet" href="css/global.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span>🧠</span>
        <span>StudyMind</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="home" onclick="navigateTo('home')">
          <span class="nav-icon">📊</span>
          <span>首页</span>
        </div>
        <div class="nav-item" data-page="plan" onclick="navigateTo('plan')">
          <span class="nav-icon">🎯</span>
          <span>学习计划</span>
        </div>
        <div class="nav-item" data-page="news" onclick="navigateTo('news')">
          <span class="nav-icon">📡</span>
          <span>资讯</span>
        </div>
        <div class="nav-item" data-page="knowledge" onclick="navigateTo('knowledge')">
          <span class="nav-icon">📚</span>
          <span>知识库</span>
        </div>
        <div class="nav-item" data-page="ai-chat" onclick="navigateTo('ai-chat')">
          <span class="nav-icon">💬</span>
          <span>AI对话</span>
        </div>
        <div class="nav-item" data-page="review" onclick="navigateTo('review')">
          <span class="nav-icon">🔁</span>
          <span>复习计划</span>
        </div>
        <div class="nav-item" data-page="output" onclick="navigateTo('output')">
          <span class="nav-icon">✍️</span>
          <span>知识沉淀</span>
        </div>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main">
      <!-- 顶部栏 -->
      <header class="topbar">
        <div class="topbar-title" id="page-title">📊 首页</div>
        <div class="topbar-right">
          <span class="topbar-greeting">👋 下午好，欢迎回来</span>
          <span class="topbar-date" id="current-date"></span>
        </div>
      </header>

      <!-- 内容容器 -->
      <div class="content" id="content-container"></div>
    </main>
  </div>

  <!-- Toast容器 -->
  <div class="toast-container" id="toast-container"></div>

  <!-- 脚本引入 -->
  <script src="js/utils.js"></script>
  <script src="js/mock.js"></script>
  <script src="js/framework.js"></script>
</body>
</html>
