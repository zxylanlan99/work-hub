<div class="ai-chat-page">
  <div class="chat-container">
    <!-- 左侧边栏 -->
    <div class="chat-sidebar">
      <div class="sidebar-header">
        <h3>对话列表</h3>
        <button class="btn btn-primary btn-sm" onclick="createNewChat()">+ 新对话</button>
      </div>
      
      <div class="conversation-list" id="chat-list">
      </div>
      
      <div class="usage-info">
        <div class="usage-label">本月已使用</div>
        <div class="usage-amount" id="usage-amount">¥0.00</div>
        <div class="usage-bar">
          <div class="usage-fill" id="usage-fill" style="width:0%"></div>
        </div>
        <div class="usage-budget" id="usage-budget">预算：¥20.00</div>
      </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="chat-main">
      <div class="chat-header">
        <h3 id="chat-title">AI助手</h3>
        <div class="header-actions">
          <button class="action-btn" onclick="exportChat()">📤 导出</button>
          <button class="action-btn" onclick="deleteChatConfirm()">🗑️ 删除</button>
        </div>
      </div>

      <div class="messages-container" id="chat-messages">
      </div>

      <!-- 输入区改造：包含知识引用标签 + textarea + 工具栏 -->
      <div class="chat-input-area">
        <!-- 知识引用标签区（选中知识条目后显示） -->
        <div id="knowledge-ref-tags" style="display:none;padding:4px 0;flex-wrap:wrap;gap:4px;"></div>
        <!-- 输入框 -->
        <textarea id="message-input" placeholder="输入你的问题..." rows="3"></textarea>
        <!-- 工具栏：附件 | 知识库 | 模型下拉 | 智能体下拉 -->
        <div class="input-toolbar">
          <button class="toolbar-btn" onclick="handleFileUpload()" title="上传附件">📎 附件</button>
          <input type="file" id="file-input" style="display:none" accept=".txt,.md,.pdf,.doc,.docx,.xls,.xlsx,.csv,.json,.xml,.html,.htm,.js,.ts,.py,.java,.cpp,.c,.h,.css,.jpg,.jpeg,.png,.gif,.webp,.svg" onchange="processFileUpload(event)" multiple>
          <div id="attached-files" style="display:none;padding:4px 0;"></div>
          <!-- 知识库选择按钮 -->
          <button class="toolbar-btn" onclick="toggleKnowledgeSelector()" title="选择知识库条目">📚 知识库<span id="knowledge-selected-count" class="badge-count" style="display:none;"></span></button>
          <!-- 输入区模型下拉 -->
          <div class="model-dropdown" id="input-model-dropdown">
            <button class="toolbar-btn model-dropdown-trigger" onclick="toggleInputModelDropdown()" id="input-model-btn">
              <span id="input-model-name">选择模型</span> ▾
            </button>
            <div class="model-dropdown-menu" id="input-model-menu" style="display:none;"></div>
          </div>
          <!-- 智能体下拉 -->
          <div class="agent-selector" id="agent-selector-wrap">
            <button class="toolbar-btn agent-dropdown-trigger" onclick="toggleAgentDropdown()" id="agent-trigger-btn">
              <span id="agent-trigger-icon">🤖</span>
              <span id="agent-trigger-name">通用助手</span> ▾
            </button>
            <div class="agent-dropdown-menu" id="agent-dropdown-menu" style="display:none;"></div>
          </div>
          <!-- 发送按钮 -->
          <button class="btn btn-primary" onclick="sendMessage()">发送</button>
        </div>
        <!-- 知识库选择面板（弹出面板） -->
        <div class="knowledge-panel" id="knowledge-selector-panel" style="display:none;">
          <div class="knowledge-panel-header">
            <span>选择引用资料</span>
            <button class="knowledge-panel-close" onclick="toggleKnowledgeSelector()">×</button>
          </div>
          <div class="knowledge-panel-body" id="knowledge-panel-body">
            <div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px;">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ================================================================
// AI 对话页面 — 智能体架构改造版
// ================================================================

/* 对话状态扩展：新增 currentAgent 字段 */
var chatState = {
  currentChatId: null,
  currentModel: null,
  currentAgent: 'general',
  inflightCount: 0,
  conversations: [],
  pendingFiles: [],       // 待发送的附件列表 [{file, name, category}]
  selectedKnowledgeIds: [] // 选中的知识条目 ID 列表
};

// ================================================================
// 辅助函数
// ================================================================

function chatToast(message, type) {
  type = type || 'info';
  if (window.utils && window.utils.toast) {
    window.utils.toast(message, type);
    return;
  }
  console.log('[Chat Toast]', type, message);
}

function escapeChatHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatChatTime(date) {
  var d = new Date(date);
  if (isNaN(d.getTime())) return '';
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

// ================================================================
// 初始化（由 framework.js 调用）
// ================================================================

async function initAiChatPage() {
  console.log('[AIChat] 🚀 开始初始化 AI 对话页面...');
  
  try {
    // 初始化 DB
    if (window.DB && window.DB.init) {
      await window.DB.init();
    }
    
    // 渲染输入区模型下拉
    renderInputModelSelector();
    
    // 渲染智能体选择器
    renderAgentSelector();
    
    // 加载对话列表
    await loadChatList();
    
    // 渲染用量信息
    renderUsageInfo();
    
    // 绑定事件
    bindChatEvents();
    
    console.log('[AIChat] ✅ AI 对话页面初始化完成');
  } catch (error) {
    console.error('[AIChat] ❌ 初始化失败:', error);
    chatToast('页面初始化失败: ' + error.message, 'error');
  }
}

// ================================================================
// 输入区模型下拉选择器
// ================================================================

function renderInputModelSelector() {
  var nameEl = document.getElementById('input-model-name');
  if (!nameEl) return;

  var models = [];
  if (window.AIService && typeof window.AIService.getAvailableModels === 'function') {
    models = window.AIService.getAvailableModels();
  }

  /* 更新触发按钮上显示的模型名称 */
  var currentModel = models.find(function(m) { return m.id === chatState.currentModel; });
  nameEl.textContent = currentModel ? currentModel.name : '选择模型';

  /* 渲染下拉菜单内容 */
  var menu = document.getElementById('input-model-menu');
  if (!menu) return;

  if (models.length === 0) {
    menu.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--gray-400);text-align:center;">' +
      '⚠️ 未配置模型</div>';
    return;
  }

  menu.innerHTML = models.map(function(model) {
    var isSelected = model.id === chatState.currentModel;
    return '<div class="model-menu-item ' + (isSelected ? 'selected' : '') + '" ' +
      'onclick="selectInputModel(\'' + escapeChatHtml(model.id) + '\')">' +
      '<span>' + escapeChatHtml(model.name) + '</span>' +
      '<span class="model-status">' + (model.status === 'ok' ? '✅' : (model.status === 'error' ? '❌' : '')) + '</span>' +
      '</div>';
  }).join('');
}

/* 切换输入区模型下拉的显示/隐藏 */
function toggleInputModelDropdown() {
  var menu = document.getElementById('input-model-menu');
  if (!menu) return;
  var isVisible = menu.style.display !== 'none';
  closeAllDropdowns();
  if (!isVisible) {
    menu.style.display = 'block';
  }
}

/* 选择输入区模型 */
function selectInputModel(modelId) {
  chatState.currentModel = modelId;
  renderInputModelSelector();
  var menu = document.getElementById('input-model-menu');
  if (menu) menu.style.display = 'none';
  var models = window.AIService ? window.AIService.getAvailableModels() : [];
  var model = models.find(function(m) { return m.id === modelId; });
  chatToast('已选择 ' + (model ? model.name : modelId), 'success');
}

// ================================================================
// 智能体选择器
// ================================================================

/**
 * 渲染智能体选择器下拉列表
 * 从 AIService.getAgents() 获取智能体列表
 */
function renderAgentSelector() {
  var agents = [];
  if (window.AIService && typeof window.AIService.getAgents === 'function') {
    agents = window.AIService.getAgents();
  }

  /* 更新触发按钮显示 */
  var currentAgent = agents.find(function(a) { return a.id === chatState.currentAgent; });
  var iconEl = document.getElementById('agent-trigger-icon');
  var nameEl = document.getElementById('agent-trigger-name');
  if (iconEl) iconEl.textContent = currentAgent ? currentAgent.icon : '🤖';
  if (nameEl) nameEl.textContent = currentAgent ? currentAgent.name : '通用助手';

  /* 渲染下拉菜单 */
  var menu = document.getElementById('agent-dropdown-menu');
  if (!menu) return;

  if (agents.length === 0) {
    menu.innerHTML = '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px;">暂无可用智能体</div>';
    return;
  }

  menu.innerHTML = agents.map(function(agent) {
    var isSelected = agent.id === chatState.currentAgent;
    return '<div class="agent-option ' + (isSelected ? 'selected' : '') + '" ' +
      'onclick="selectAgent(\'' + escapeChatHtml(agent.id) + '\')">' +
      '<div class="agent-option-icon">' + escapeChatHtml(agent.icon) + '</div>' +
      '<div class="agent-option-info">' +
        '<div class="agent-option-name">' + escapeChatHtml(agent.name) + '</div>' +
        '<div class="agent-option-desc">' + escapeChatHtml(agent.description || '') + '</div>' +
      '</div>' +
      '</div>';
  }).join('');
}

/**
 * 切换智能体下拉的显示/隐藏
 */
function toggleAgentDropdown() {
  var menu = document.getElementById('agent-dropdown-menu');
  if (!menu) return;
  var isVisible = menu.style.display !== 'none';
  closeAllDropdowns();
  if (!isVisible) {
    menu.style.display = 'block';
  }
}

/**
 * 选择智能体，更新 UI 和当前对话的 agentId
 * @param {string} agentId - 智能体 ID
 */
function selectAgent(agentId) {
  chatState.currentAgent = agentId;
  renderAgentSelector();

  /* 关闭下拉菜单 */
  var menu = document.getElementById('agent-dropdown-menu');
  if (menu) menu.style.display = 'none';

  /* 如果当前有对话，更新对话的 agentId */
  if (chatState.currentChatId && window.DB && typeof window.DB.updateChat === 'function') {
    window.DB.updateChat(chatState.currentChatId, { agentId: agentId }).catch(function(e) {
      console.warn('[AIChat] 更新对话智能体失败:', e.message);
    });
  }

  /* toast 提示 */
  var agents = window.AIService ? window.AIService.getAgents() : [];
  var agent = agents.find(function(a) { return a.id === agentId; });
  chatToast('已切换智能体: ' + (agent ? agent.name : agentId), 'success');
}

/**
 * 关闭所有下拉菜单（工具栏通用）
 */
function closeAllDropdowns() {
  var modelMenu = document.getElementById('input-model-menu');
  if (modelMenu) modelMenu.style.display = 'none';
  var agentMenu = document.getElementById('agent-dropdown-menu');
  if (agentMenu) agentMenu.style.display = 'none';
}

// ================================================================
// 知识库选择面板（增强版：支持分类树导航）
// ================================================================

/**
 * 切换知识库选择面板的显示/隐藏
 */
async function toggleKnowledgeSelector() {
  var panel = document.getElementById('knowledge-selector-panel');
  if (!panel) return;

  if (panel.style.display === 'none' || !panel.style.display) {
    panel.style.display = 'flex';
    await renderKnowledgePanel();
  } else {
    panel.style.display = 'none';
  }
}

/**
 * 渲染知识库选择面板内容
 * 显示分类树（递归渲染）+ 条目列表，每个条目前有 checkbox
 */
async function renderKnowledgePanel() {
  var body = document.getElementById('knowledge-panel-body');
  if (!body) return;

  body.innerHTML = '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px;">加载中...</div>';

  try {
    if (!window.DB) throw new Error('数据库服务未初始化');

    /* 并行加载分类树和知识条目 */
    var catResult = await window.DB.getCategories();
    var cats = (catResult.success ? catResult.data : catResult.data) || [];

    var itemResult = await window.DB._exec(
      window.DB._collection('knowledge_items').where({ isDeleted: false }).limit(200).get()
    );
    var items = (itemResult.data || []);

    /* 构建分类父子关系 */
    var childMap = {};
    var rootCats = [];
    cats.forEach(function(c) {
      if (c.parentId) {
        if (!childMap[c.parentId]) childMap[c.parentId] = [];
        childMap[c.parentId].push(c);
      } else {
        rootCats.push(c);
      }
    });

    /* 统计每个分类下的条目数 */
    var catItemCount = {};
    items.forEach(function(item) {
      if (item.categoryId) {
        catItemCount[item.categoryId] = (catItemCount[item.categoryId] || 0) + 1;
      }
    });

    /* 递归渲染分类树节点 */
    function renderCatNode(cat, depth) {
      var count = catItemCount[cat._id] || 0;
      var hasChildren = childMap[cat._id] && childMap[cat._id].length > 0;
      var indent = 'padding-left:' + (depth * 16) + 'px;';
      var html = '<div class="kb-cat-node" style="' + indent + '" onclick="filterKnowledgeByCategory(\'' +
        escapeChatHtml(cat._id) + '\', this)">' +
        '<span class="kb-cat-icon">' + escapeChatHtml(cat.icon || '📁') + '</span>' +
        '<span class="kb-cat-name">' + escapeChatHtml(cat.name) + '</span>' +
        '<span class="kb-cat-count">' + count + '</span>' +
        '</div>';
      if (hasChildren) {
        html += '<div class="kb-cat-children">';
        childMap[cat._id].forEach(function(child) {
          html += renderCatNode(child, depth + 1);
        });
        html += '</div>';
      }
      return html;
    }

    /* 构建面板 HTML */
    var html = '';

    /* 搜索框 */
    html += '<div class="knowledge-panel-search">' +
      '<input type="text" placeholder="搜索知识条目..." oninput="searchKnowledgeInPanel(this.value)">' +
      '</div>';

    /* "全部" 分类入口 */
    html += '<div class="kb-cat-node active" onclick="filterKnowledgeByCategory(null, this)">' +
      '<span class="kb-cat-icon">📚</span>' +
      '<span class="kb-cat-name">全部条目</span>' +
      '<span class="kb-cat-count">' + items.length + '</span>' +
      '</div>';

    /* 分类树（递归渲染） */
    html += '<div id="kb-panel-cat-tree">';
    rootCats.forEach(function(cat) {
      html += renderCatNode(cat, 0);
    });
    html += '</div>';

    /* 条目列表区 */
    html += '<div id="kb-panel-items-list" style="margin-top:8px;border-top:1px solid var(--gray-100,#f4f4f5);padding-top:8px;">';
    html += renderKnowledgePanelItems(items);
    html += '</div>';

    body.innerHTML = html;

    /* 存储条目缓存供过滤使用 */
    chatState._kbPanelItems = items;
    chatState._kbPanelCats = cats;

  } catch (error) {
    console.error('[AIChat] 渲染知识库面板失败:', error);
    body.innerHTML = '<div style="padding:16px;text-align:center;color:var(--danger,#ef4444);font-size:13px;">加载失败: ' +
      escapeChatHtml(error.message) + '</div>';
  }
}

/**
 * 渲染知识条目列表（带 checkbox）
 * @param {Array} items - 知识条目数组
 * @returns {string} HTML 字符串
 */
function renderKnowledgePanelItems(items) {
  if (!items || items.length === 0) {
    return '<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:12px;">暂无条目</div>';
  }
  return items.map(function(item) {
    var isSelected = chatState.selectedKnowledgeIds.indexOf(item._id) !== -1;
    return '<div class="kb-item-row ' + (isSelected ? 'checked' : '') + '" ' +
      'onclick="toggleKnowledgeItem(\'' + escapeChatHtml(item._id) + '\')">' +
      '<div class="kb-item-checkbox ' + (isSelected ? 'checked' : '') + '">' +
        (isSelected ? '✓' : '') +
      '</div>' +
      '<div class="kb-item-title">' + escapeChatHtml(item.title || '未命名') + '</div>' +
      '<div class="kb-item-summary">' + escapeChatHtml((item.summary || '').substring(0, 30)) + '</div>' +
      '</div>';
  }).join('');
}

/**
 * 按分类过滤知识条目
 * @param {string|null} categoryId - 分类 ID，null 表示全部
 * @param {HTMLElement} el - 点击的节点元素
 */
function filterKnowledgeByCategory(categoryId, el) {
  /* 更新分类节点高亮 */
  var allNodes = document.querySelectorAll('#knowledge-panel-body .kb-cat-node');
  allNodes.forEach(function(n) { n.classList.remove('active'); });
  if (el) el.classList.add('active');

  /* 过滤条目 */
  var items = chatState._kbPanelItems || [];
  var filtered = categoryId
    ? items.filter(function(item) { return item.categoryId === categoryId; })
    : items;

  var listContainer = document.getElementById('kb-panel-items-list');
  if (listContainer) {
    listContainer.innerHTML = renderKnowledgePanelItems(filtered);
  }
}

/**
 * 在知识库面板内搜索条目
 * @param {string} query - 搜索关键词
 */
function searchKnowledgeInPanel(query) {
  var items = chatState._kbPanelItems || [];
  var q = (query || '').trim().toLowerCase();
  var filtered = q
    ? items.filter(function(item) {
        var title = (item.title || '').toLowerCase();
        var summary = (item.summary || '').toLowerCase();
        return title.indexOf(q) !== -1 || summary.indexOf(q) !== -1;
      })
    : items;

  var listContainer = document.getElementById('kb-panel-items-list');
  if (listContainer) {
    listContainer.innerHTML = renderKnowledgePanelItems(filtered);
  }
}

/**
 * 切换知识条目的选中状态
 * @param {string} itemId - 知识条目 ID
 */
function toggleKnowledgeItem(itemId) {
  var idx = chatState.selectedKnowledgeIds.indexOf(itemId);
  if (idx === -1) {
    chatState.selectedKnowledgeIds.push(itemId);
  } else {
    chatState.selectedKnowledgeIds.splice(idx, 1);
  }
  /* 重新渲染条目列表 checkbox 状态 */
  var listContainer = document.getElementById('kb-panel-items-list');
  if (listContainer && chatState._kbPanelItems) {
    /* 获取当前过滤状态 */
    var activeNode = document.querySelector('#knowledge-panel-body .kb-cat-node.active');
    var catId = null;
    if (activeNode) {
      var onclickAttr = activeNode.getAttribute('onclick') || '';
      var match = onclickAttr.match(/filterKnowledgeByCategory\('([^']*)'/);
      if (match && match[1]) catId = match[1];
    }
    var filtered = catId
      ? chatState._kbPanelItems.filter(function(item) { return item.categoryId === catId; })
      : chatState._kbPanelItems;
    listContainer.innerHTML = renderKnowledgePanelItems(filtered);
  }
  /* 更新引用标签区 */
  renderKnowledgeRefTags();
}

/**
 * 移除选中的知识引用
 * @param {string} itemId - 知识条目 ID
 */
function removeKnowledgeRef(itemId) {
  var idx = chatState.selectedKnowledgeIds.indexOf(itemId);
  if (idx !== -1) {
    chatState.selectedKnowledgeIds.splice(idx, 1);
  }
  renderKnowledgeRefTags();
}

/**
 * 渲染输入框上方的知识引用标签
 */
function renderKnowledgeRefTags() {
  var container = document.getElementById('knowledge-ref-tags');
  if (!container) return;

  var count = chatState.selectedKnowledgeIds.length;

  /* 更新 badge 计数 */
  var badge = document.getElementById('knowledge-selected-count');
  if (badge) {
    badge.textContent = count > 0 ? String(count) : '';
    badge.style.display = count > 0 ? 'inline-flex' : 'none';
  }

  if (count === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }

  container.style.display = 'flex';

  /* 从缓存中获取条目名称 */
  var items = chatState._kbPanelItems || [];
  var html = chatState.selectedKnowledgeIds.map(function(id) {
    var item = items.find(function(it) { return it._id === id; });
    var name = item ? (item.title || '未命名') : id;
    return '<span class="knowledge-ref-tag">' +
      '<span class="ref-icon">📄</span>' +
      escapeChatHtml(name.substring(0, 20)) +
      '<span class="ref-remove" onclick="removeKnowledgeRef(\'' + escapeChatHtml(id) + '\')" title="移除引用">×</span>' +
      '</span>';
  }).join('');

  container.innerHTML = html;
}

/**
 * 加载对话列表，列表项显示智能体图标
 */
async function loadChatList() {
  var list = document.getElementById('chat-list');
  if (!list) return;
  
  try {
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');
    var result = await window.DB.getChats(1, 50);
    
    chatState.conversations = result.data || [];
    
    if (chatState.conversations.length === 0) {
      list.innerHTML = '<div class="empty-state" style="text-align:center;padding:30px 20px;">' +
        '<div style="font-size:32px;margin-bottom:8px;">💬</div>' +
        '<div style="color:var(--gray-500);font-size:13px;">暂无对话</div>' +
        '<div style="color:var(--gray-400);font-size:12px;margin-top:4px;">点击「+ 新对话」开始</div>' +
        '</div>';
      return;
    }

    /* 获取智能体列表用于显示图标 */
    var agents = [];
    if (window.AIService && typeof window.AIService.getAgents === 'function') {
      agents = window.AIService.getAgents();
    }

    /* 获取知识条目缓存（如果需要显示引用标签名称） */
    var kbItems = chatState._kbPanelItems || [];
    if (kbItems.length === 0 && window.DB) {
      try {
        var kbResult = await window.DB._exec(
          window.DB._collection('knowledge_items').where({ isDeleted: false }).limit(200).get()
        );
        kbItems = kbResult.data || [];
        chatState._kbPanelItems = kbItems;
      } catch (e) { /* 非阻塞 */ }
    }
    
    list.innerHTML = chatState.conversations.map(function(chat) {
      var isActive = chatState.currentChatId === (chat._id || chat.id);
      var title = escapeChatHtml(chat.title || '未命名对话');
      var preview = escapeChatHtml((chat.lastMessage || '暂无消息').substring(0, 40));
      var time = chat.updatedAt || chat.createdAt;
      var timeStr = time ? formatChatTime(time) : '';
      var chatId = chat._id || chat.id;

      /* 根据对话的 agentId 显示智能体图标 */
      var agentId = chat.agentId || 'general';
      var agent = agents.find(function(a) { return a.id === agentId; });
      var agentIcon = agent ? agent.icon : '🤖';
      
      return '<div class="conversation-item ' + (isActive ? 'active' : '') + '" ' +
        'onclick="selectChat(\'' + chatId + '\', \'' + title.replace(/'/g, "\\'") + '\')" ' +
        'id="chat-item-' + chatId + '" style="cursor:pointer;">' +
        '<div class="conv-icon">' + escapeChatHtml(agentIcon) + '</div>' +
        '<div class="conv-info">' +
        '<div class="conv-title">' + title + '</div>' +
        '<div class="conv-preview">' + preview + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:4px;">' +
        '<div class="conv-time">' + timeStr + '</div>' +
        '<span class="conv-delete-btn" onclick="event.stopPropagation();deleteChatFromList(\'' + chatId + '\')" title="删除对话" ' +
          'style="cursor:pointer;font-size:14px;color:var(--gray-400);padding:2px 4px;border-radius:4px;opacity:0;transition:opacity 0.15s;">🗑️</span>' +
        '</div>' +
        '</div>';
    }).join('');
  } catch (error) {
    console.error('[AIChat] 加载对话列表失败:', error);
    list.innerHTML = '<div class="empty-state" style="text-align:center;padding:30px;color:var(--gray-400);">加载失败</div>';
  }
}

/**

 * @param {string} chatId - 对话 ID
 * @param {string} title - 对话标题
 */
async function selectChat(chatId, title) {
  if (!chatId) return;

  try {
    chatState.currentChatId = chatId;

    /* 更新 UI 选中状态 */
    document.querySelectorAll('.conversation-item').forEach(function(el) {
      el.classList.remove('active');
    });
    var item = document.getElementById('chat-item-' + chatId);
    if (item) item.classList.add('active');

    document.getElementById('chat-title').textContent = title || 'AI助手';

    /* 恢复对话的 agentId */
    var chat = chatState.conversations.find(function(c) {
      return (c._id || c.id) === chatId;
    });
    if (chat && chat.agentId) {
      chatState.currentAgent = chat.agentId;
      renderAgentSelector();
    }

    await loadMessages(chatId);
  } catch (error) {
    console.error('[AIChat] 选择对话失败:', error);
    chatToast('加载对话失败: ' + error.message, 'error');
  }
}

async function loadMessages(chatId) {
  var container = document.getElementById('chat-messages');
  if (!container) return;
  
  try {
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');
    var result = await window.DB.getMessages(chatId);
    
    var messages = (result.data || []).sort(function(a, b) {
      return new Date(a.createdAt) - new Date(b.createdAt);
    });
    
    if (messages.length === 0) {
      container.innerHTML = '<div class="empty-state" style="text-align:center;padding:60px 20px;">' +
        '<div style="font-size:48px;margin-bottom:12px;">💭</div>' +
        '<div style="color:var(--gray-500);font-size:14px;">开始对话</div>' +
        '<div style="color:var(--gray-400);font-size:12px;margin-top:4px;">输入消息开始与 AI 聊天</div>' +
        '</div>';
      return;
    }
    
    container.innerHTML = messages.map(function(msg) {
      return renderMessageHtml(msg);
    }).join('');
    
    container.scrollTop = container.scrollHeight;
  } catch (error) {
    console.error('[AIChat] 加载消息失败:', error);
    container.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;color:var(--gray-400);">加载失败</div>';

function renderMessageHtml(msg) {
  var isUser = msg.role === 'user';
  var time = msg.createdAt ? formatChatTime(msg.createdAt) : '';

  // AI 消息：简单 markdown 渲染（代码块 + 加粗 + 换行）
  // 用户消息：转义后保留换行
  var contentHtml;
  if (isUser) {
    contentHtml = '<div style="white-space:pre-wrap;word-break:break-word;">' + escapeChatHtml(msg.content) + '</div>';
  } else {
    contentHtml = '<div class="ai-message-body" style="word-break:break-word;line-height:1.7;">' +
      renderMarkdownLite(msg.content) + '</div>';
  }

  // 附件标签（仅用于临时预览，已发送消息不含附件信息）
  var attachmentHtml = '';
  if (msg.attachments && msg.attachments.length > 0) {
    attachmentHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">' +
      msg.attachments.map(function(a) {
        return '<span style="background:rgba(255,255,255,0.2);border-radius:8px;padding:2px 8px;font-size:11px;">📎 ' +
          escapeChatHtml(a) + '</span>';
      }).join('') + '</div>';
  }

  if (isUser) {
    // 用户消息：右对齐，蓝色气泡
    return '<div class="message user" style="display:flex;align-items:flex-end;justify-content:flex-end;gap:8px;margin-bottom:18px;padding:0 8px;">' +
      '<div style="max-width:72%;order:1;">' +
        '<div style="background:var(--primary);color:#fff;' +
          'padding:10px 14px;border-radius:18px 18px 4px 18px;' +
          'box-shadow:0 1px 4px rgba(0,0,0,0.1);font-size:14px;line-height:1.6;">' +
          attachmentHtml + contentHtml +
        '</div>' +
        '<div style="font-size:11px;color:var(--gray-400);margin-top:4px;text-align:right;padding-right:2px;">' + time + '</div>' +
      '</div>' +
      '<div style="order:2;width:32px;height:32px;border-radius:50%;background:var(--primary);' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;">👤</div>' +
      '</div>';
  } else {
    // AI 消息：左对齐，浅灰气泡
    return '<div class="message assistant" style="display:flex;align-items:flex-start;gap:8px;margin-bottom:18px;padding:0 8px;">' +
      '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;">🤖</div>' +
      '<div style="max-width:72%;">' +
        '<div style="background:var(--gray-100,#f4f4f5);color:var(--gray-800,#1f2937);' +
          'padding:10px 14px;border-radius:18px 18px 18px 4px;' +
          'box-shadow:0 1px 4px rgba(0,0,0,0.06);font-size:14px;">' +
          contentHtml +
        '</div>' +
        '<div style="font-size:11px;color:var(--gray-400);margin-top:4px;padding-left:2px;">' + time + '</div>' +
      '</div>' +
      '</div>';
  }
}

// 轻量 Markdown 渲染（支持代码块、行内代码、加粗、斜体、换行、列表）
function renderMarkdownLite(text) {
  if (!text) return '';
  var html = escapeChatHtml(text);
  /* 代码块 */
  html = html.replace(/```([\w]*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre style="background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;' +
      'overflow-x:auto;font-size:13px;margin:8px 0;"><code>' + code.trim() + '</code></pre>';
  });
  /* 行内代码 */
  html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.08);padding:1px 5px;border-radius:4px;font-size:13px;">$1</code>');
  /* 加粗 */
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  /* 斜体 */
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  /* 无序列表（以 - 或 • 开头）*/
  html = html.replace(/^[-•] (.+)$/gm, '<li style="margin:2px 0;">$1</li>');
  html = html.replace(/(<li[^>]*>[\s\S]+?<\/li>)/g, '<ul style="padding-left:16px;margin:4px 0;">$1</ul>');
  /* 换行 */
  html = html.replace(/\n/g, '<br>');
  /* DOMPurify XSS 清理：防止 AI 回复中包含恶意 HTML */
  if (typeof window.DOMPurify !== 'undefined' && typeof window.DOMPurify.sanitize === 'function') {
    html = window.DOMPurify.sanitize(html);
  }
  return html;
}

/**
 * 发送消息 — 关键改造：
 * 1. 如果有选中的智能体，使用 AIService.buildAgentSystemPrompt(agentId) 构建 system prompt
 * 2. 如果有选中的知识条目，使用 DB.sendMessageWithKnowledge() 发送
 * 3. AI 回复后检查是否包含 <kb-commands> 标签，解析并执行
 */
async function sendMessage() {
  var input = document.getElementById('message-input');
  var content = input ? input.value.trim() : '';
  
  // 有附件时允许空文本消息（附件本身就是内容）
  if (!content && chatState.pendingFiles.length === 0) {
    chatToast('请输入消息或上传附件', 'warning');
    return;
  }
  
  if (!chatState.currentChatId) {
    chatToast('请先创建或选择一个对话', 'warning');
    return;
  }
  
  if (chatState.inflightCount >= 2) {
    chatToast('正在处理上一条消息，请稍候', 'warning');
    return;
  }
  
  // 检查模型配置
  var models = window.AIService ? window.AIService.getAvailableModels() : [];
  if (models.length === 0) {
    chatToast('请先在设置页面配置 AI 模型', 'warning');
    return;
  }

  // 收集附件信息（用于气泡展示）
  var attachmentNames = chatState.pendingFiles.map(function(f) { return f.name; });

  // ① 先清空输入框和附件区（让 UI 立即响应）
  if (input) input.value = '';
  var pendingFiles = chatState.pendingFiles.slice();
  chatState.pendingFiles = [];
  renderAttachedFiles();
  
  // ② 发送时读取附件内容
  var fileContents = '';
  if (pendingFiles.length > 0) {
    try {
      var contents = await Promise.all(pendingFiles.map(readFileContent));
      fileContents = contents.join('');
    } catch (e) {
      console.warn('[AIChat] 读取附件失败:', e);
    }
  }

  // ③ 组合最终发送内容
  var finalContent = content + fileContents;
  
  var container = document.getElementById('chat-messages');
  
  // ④ 显示用户消息（带附件标签）
  if (container) {
    container.innerHTML += renderMessageHtml({
      role: 'user',
      content: content || '（仅附件）',
      attachments: attachmentNames,
      createdAt: new Date()
    });
    container.scrollTop = container.scrollHeight;
  }
  
  // 显示 typing indicator
  if (container) {
    container.innerHTML += '<div id="typing-indicator" style="display:flex;align-items:flex-start;gap:8px;margin-bottom:18px;padding:0 8px;">' +
      '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;">🤖</div>' +
      '<div style="background:var(--gray-100,#f4f4f5);padding:12px 16px;border-radius:18px 18px 18px 4px;">' +
      '<div class="typing-dots"><span></span><span></span><span></span></div>' +
      '</div></div>';
    container.scrollTop = container.scrollHeight;
  }
  
  chatState.inflightCount++;

  // 复制当前选中的知识条目 ID（发送后会清空）
  var selectedKnowledgeIds = chatState.selectedKnowledgeIds.slice();
  
  try {
    console.log('[AIChat] 📡 发送消息:', {
      chatId: chatState.currentChatId,
      model: chatState.currentModel,
      agent: chatState.currentAgent,
      hasAttachments: pendingFiles.length > 0,
      knowledgeCount: selectedKnowledgeIds.length
    });
    
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');

    var result;

    /* 关键改造：如果有选中的知识条目，使用 sendMessageWithKnowledge */
    if (selectedKnowledgeIds.length > 0) {
      result = await window.DB.sendMessageWithKnowledge(
        chatState.currentChatId, finalContent, selectedKnowledgeIds, chatState.currentModel
      );
    } else {
      /* 关键改造：如果有选中的智能体，先构建 agent system prompt */
      if (chatState.currentAgent && chatState.currentAgent !== 'general' &&
          window.AIService && typeof window.AIService.buildAgentSystemPrompt === 'function') {
        try {
          var agentPrompt = await window.AIService.buildAgentSystemPrompt(chatState.currentAgent);
          if (agentPrompt) {
            /* 使用带 agent prompt 的 AI 调用 */
            var aiResult = await window.AIService.callAI({
              action: 'chat',
              messages: [
                { role: 'system', content: agentPrompt },
                { role: 'user', content: finalContent }
              ],
              model: chatState.currentModel
            });
            if (aiResult.success) {
              /* 手动写入消息到 DB */
              await window.DB._collection('messages').add({
                chatId: chatState.currentChatId,
                role: 'user',
                content: finalContent,
                model: null,
                tokens: 0,
                cost: 0,
                isStarred: false,
                createdAt: new Date()
              });
              await window.DB._collection('messages').add({
                chatId: chatState.currentChatId,
                role: 'assistant',
                content: aiResult.content,
                model: chatState.currentModel,
                tokens: aiResult.tokens || 0,
                cost: aiResult.cost || 0,
                isStarred: false,
                createdAt: new Date()
              });
              await window.DB._collection('chats').doc(chatState.currentChatId).update({ updatedAt: new Date() });
              result = { success: true, data: { reply: aiResult.content } };
            } else {
              throw new Error(aiResult.error || 'AI 调用失败');
            }
          } else {
            result = await window.DB.sendMessageAndReply(chatState.currentChatId, finalContent, chatState.currentModel);
          }
        } catch (agentErr) {
          console.warn('[AIChat] 智能体 prompt 构建失败，使用默认方式:', agentErr.message);
          result = await window.DB.sendMessageAndReply(chatState.currentChatId, finalContent, chatState.currentModel);
        }
      } else {
        result = await window.DB.sendMessageAndReply(chatState.currentChatId, finalContent, chatState.currentModel);
      }
    }

    // 发送后清空已选知识条目
    chatState.selectedKnowledgeIds = [];
    renderKnowledgeRefTags();
    
    // 移除 typing indicator
    var typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
    
    if (result.success && result.data && result.data.reply) {
      // 显示 AI 回复
      if (container) {
        container.innerHTML += renderMessageHtml({
          role: 'assistant',
          content: result.data.reply,
          createdAt: new Date()
        });
        container.scrollTop = container.scrollHeight;
      }
      console.log('[AIChat] ✅ AI 回复成功');

      /* Issue 3a: 如果对话标题是「新对话」，用用户第一条消息内容更新标题（取前20个字符） */
      try {
        var chatItem = chatState.conversations.find(function(c) {
          return (c._id || c.id) === chatState.currentChatId;
        });
        if (chatItem && (chatItem.title === '新对话' || !chatItem.title)) {
          var newTitle = content.substring(0, 20) || '新对话';
          await window.DB.updateChat(chatState.currentChatId, { title: newTitle });
          document.getElementById('chat-title').textContent = newTitle;
        }
      } catch (titleErr) {
        console.warn('[AIChat] 更新对话标题失败:', titleErr.message);
      }

      /* 关键改造：解析 AI 回复中的 <kb-commands> 标签并执行 */
      await parseAndExecuteKbCommands(result.data.reply);
    } else {
      chatToast('AI 回复失败: ' + (result.error || '未知错误'), 'error');
      // 显示错误消息
      if (container) {
        container.innerHTML += renderMessageHtml({
          role: 'assistant',
          content: '❌ 抱歉，回复失败：' + (result.error || '未知错误'),
          createdAt: new Date()
        });
        container.scrollTop = container.scrollHeight;
      }
    }
    
    // 刷新对话列表
    await loadChatList();
  } catch (error) {
    console.error('[AIChat] 发送消息失败:', error);
    var typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
    chatToast('发送失败: ' + error.message, 'error');
  } finally {
    chatState.inflightCount--;
  }
}

// ================================================================
// 解析并执行 AI 回复中的知识库命令
// ================================================================

/**
 * 解析 AI 回复中的 <kb-commands> 标签，提取 JSON 并逐条执行
 * @param {string} reply - AI 回复文本
 */
async function parseAndExecuteKbCommands(reply) {
  if (!reply) return;

  /* 正则提取 <kb-commands>...</kb-commands> 中的内容 */
  var cmdRegex = /<kb-commands>([\s\S]*?)<\/kb-commands>/g;
  var match;
  var hasCommands = false;

  while ((match = cmdRegex.exec(reply)) !== null) {
    var jsonStr = match[1].trim();
    if (!jsonStr) continue;

    try {
      var commands = JSON.parse(jsonStr);
      if (!Array.isArray(commands)) {
        console.warn('[AIChat] kb-commands 不是数组格式:', commands);
        continue;
      }

      hasCommands = true;
      console.log('[AIChat] 🔧 解析到 ' + commands.length + ' 条知识库命令');

      /* 逐条调用 DB.executeKbCommand() 执行 */
      if (window.DB && typeof window.DB.executeKbCommand === 'function') {
        var execResult = await window.DB.executeKbCommand(commands);
        if (execResult.success) {
          var successCount = (execResult.results || []).filter(function(r) { return r.success; }).length;
          var failCount = (execResult.results || []).length - successCount;
          if (failCount > 0) {
            chatToast('知识库操作完成：成功 ' + successCount + ' 条，失败 ' + failCount + ' 条', 'warning');
          } else {
            chatToast('知识库操作完成：成功执行 ' + successCount + ' 条命令', 'success');
          }
        } else {
          chatToast('知识库操作失败: ' + (execResult.error || '未知错误'), 'error');
        }
      } else {
        chatToast('知识库命令执行服务不可用', 'error');
      }
    } catch (e) {
      console.error('[AIChat] 解析 kb-commands JSON 失败:', e);
      chatToast('知识库命令解析失败: ' + e.message, 'error');
    }
  }

  if (!hasCommands) {
    console.log('[AIChat] AI 回复中无 kb-commands 标签');
  }
}

function exportChat() {
  if (!chatState.currentChatId) {
    chatToast('请先选择一个对话', 'warning');
    return;
  }
  
  var container = document.getElementById('chat-messages');
  if (!container) return;
  
  // 从 DOM 提取消息文本
  var messages = container.querySelectorAll('.message');
  if (messages.length === 0) {
    chatToast('暂无消息可导出', 'warning');
    return;
  }
  
  var lines = [];
  messages.forEach(function(msgEl) {
    var isUser = msgEl.classList.contains('user');
    var bubble = msgEl.querySelector('div[style*="border-radius"]');
    var msgContent = bubble ? bubble.textContent : msgEl.textContent;
    lines.push((isUser ? '我' : 'AI') + ': ' + msgContent);
  });
  
  var content = lines.join('\n\n---\n\n');
  var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '对话_' + new Date().toISOString().split('T')[0] + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  chatToast('对话已导出', 'success');
}

function handleFileUpload() {
  var input = document.getElementById('file-input');
  if (input) input.click();
}

// 文件类型分类
var FILE_TYPE_SUPPORT = {
  text: ['.txt', '.md', '.csv', '.json', '.xml', '.html', '.htm', '.js', '.ts', '.py', '.java', '.cpp', '.c', '.h', '.css'],
  image: ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg'],
  doc: ['.pdf', '.doc', '.docx', '.xls', '.xlsx']
};

function getFileCategory(file) {
  var name = file.name.toLowerCase();
  if (file.type.startsWith('text/')) return 'text';
  var ext;
  for (var i = 0; i < FILE_TYPE_SUPPORT.text.length; i++) {
    ext = FILE_TYPE_SUPPORT.text[i];
    if (name.endsWith(ext)) return 'text';
  }
  for (var j = 0; j < FILE_TYPE_SUPPORT.image.length; j++) {
    ext = FILE_TYPE_SUPPORT.image[j];
    if (name.endsWith(ext)) return 'image';
  }
  for (var k = 0; k < FILE_TYPE_SUPPORT.doc.length; k++) {
    ext = FILE_TYPE_SUPPORT.doc[k];
    if (name.endsWith(ext)) return 'doc';
  }
  return 'unknown';
}

function processFileUpload(event) {
  var files = event.target.files;
  if (!files || files.length === 0) return;

  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var category = getFileCategory(file);

    if (category === 'unknown') {
      chatToast('不支持的文件类型: ' + file.name, 'warning');
      continue;
    }

    // 文件大小限制 10MB
    if (file.size > 10 * 1024 * 1024) {
      chatToast('文件过大（最大 10MB）: ' + file.name, 'warning');
      continue;
    }

    chatState.pendingFiles.push({ file: file, name: file.name, category: category });
    chatToast('已添加附件: ' + file.name, 'success');
  }

  // 渲染附件预览标签
  renderAttachedFiles();

  // 重置 input 以便重复上传
  event.target.value = '';
}

function renderAttachedFiles() {
  var container = document.getElementById('attached-files');
  if (!container) return;

  if (chatState.pendingFiles.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }

  container.style.display = 'flex';
  container.style.flexWrap = 'wrap';
  container.style.gap = '6px';
  container.style.padding = '6px 0 2px';

  container.innerHTML = chatState.pendingFiles.map(function(f, idx) {
    var icon = f.category === 'image' ? '🖼️' : (f.category === 'doc' ? '📄' : '📝');
    return '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--gray-100,#f4f4f5);' +
      'border:1px solid var(--gray-200,#e4e4e7);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--gray-700,#374151);">' +
      icon + ' ' + escapeChatHtml(f.name) +
      ' <span onclick="removeAttachment(' + idx + ')" style="cursor:pointer;color:var(--gray-400);margin-left:2px;' +
      'font-size:14px;line-height:1;" title="移除">×</span>' +
      '</span>';
  }).join('');
}

function removeAttachment(idx) {
  chatState.pendingFiles.splice(idx, 1);
  renderAttachedFiles();
}

// 读取文件内容（返回 Promise<string>）
function readFileContent(fileObj) {
  return new Promise(function(resolve, reject) {
    var file = fileObj.file;
    var category = fileObj.category;

    if (category === 'image') {
      resolve('[图片文件: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB)]');
      return;
    }

    if (category === 'doc') {
      resolve('[附件: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB) — 请注意此为二进制文档格式，内容解析需后端支持]');
      return;
    }

    // 文本文件：直接读取（最多 4000 字符）
    var reader = new FileReader();
    reader.onload = function(e) {
      var content = e.target.result;
      if (content.length > 4000) {
        content = content.substring(0, 4000) + '\n... [文件内容过长，已截断至前4000字符]';
      }
      resolve('\n\n--- 附件: ' + file.name + ' ---\n' + content + '\n--- 附件结束 ---');
    };
    reader.onerror = function() {
      resolve('[附件读取失败: ' + file.name + ']');
    };
    reader.readAsText(file, 'UTF-8');
  });
}

function renderUsageInfo() {
  var settings = window.AIService ? window.AIService.getAISettings() : {};
  var used = settings.budgetUsed || 0;
  var budget = settings.monthlyBudget || 20;
  
  var amountEl = document.getElementById('usage-amount');
  if (amountEl) amountEl.textContent = '¥' + used.toFixed(2);
  
  var budgetEl = document.getElementById('usage-budget');
  if (budgetEl) budgetEl.textContent = '预算：¥' + budget.toFixed(2);
  
  var fillEl = document.getElementById('usage-fill');
  if (fillEl) {
    var pct = budget > 0 ? Math.min(100, (used / budget) * 100) : 0;
    fillEl.style.width = pct + '%';
  }
}

/* 绑定事件：键盘快捷键 + 点击外部关闭下拉 */
function bindChatEvents() {
  var input = document.getElementById('message-input');
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }

  /* 点击页面其他区域时关闭所有下拉菜单 */
  document.addEventListener('click', function(e) {
    var agentWrap = document.getElementById('agent-selector-wrap');
    var modelWrap = document.getElementById('input-model-dropdown');
    var kbPanel = document.getElementById('knowledge-selector-panel');

    /* 如果点击不在下拉区域内，关闭所有下拉 */
    if (agentWrap && !agentWrap.contains(e.target)) {
      var agentMenu = document.getElementById('agent-dropdown-menu');
      if (agentMenu) agentMenu.style.display = 'none';
    }
    if (modelWrap && !modelWrap.contains(e.target)) {
      var modelMenu = document.getElementById('input-model-menu');
      if (modelMenu) modelMenu.style.display = 'none';
    }
  });
}
