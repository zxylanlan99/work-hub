<div class="ai-chat-page">
  <div class="chat-container">
    <!-- 左侧边栏 -->
    <div class="chat-sidebar">
      <div class="sidebar-header">
        <h3>对话列表</h3>
        <button class="btn btn-primary btn-sm" onclick="createNewChat()">+ 新对话</button>
      </div>
      
      <div class="conversation-list" id="chat-list">
      </div>
      
      <div class="model-selector">
        <label>选择模型</label>
        <div class="model-options" id="model-options">
        </div>
      </div>
      
      <div class="usage-info">
        <div class="usage-label">本月已使用</div>
        <div class="usage-amount" id="usage-amount">¥0.00</div>
        <div class="usage-bar">
          <div class="usage-fill" id="usage-fill" style="width:0%"></div>
        </div>
        <div class="usage-budget" id="usage-budget">预算：¥20.00</div>
      </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="chat-main">
      <div class="chat-header">
        <h3 id="chat-title">AI助手</h3>
        <div class="header-actions">
          <button class="action-btn" onclick="exportChat()">📤 导出</button>
          <button class="action-btn" onclick="deleteChatConfirm()">🗑️ 删除</button>
        </div>
      </div>

      <div class="messages-container" id="chat-messages">
      </div>

      <div class="chat-input-area">
        <textarea id="message-input" placeholder="输入你的问题..." rows="3"></textarea>
        <div class="input-actions">
          <button class="btn btn-outline" onclick="handleFileUpload()">📎 上传文件</button>
          <input type="file" id="file-input" style="display:none" accept=".txt,.md,.pdf,.doc,.docx,.xls,.xlsx,.csv,.json,.xml,.html,.htm,.js,.ts,.py,.java,.cpp,.c,.h,.css,.jpg,.jpeg,.png,.gif,.webp,.svg" onchange="processFileUpload(event)" multiple>
          <div id="attached-files" style="display:none;padding:4px 0;"></div>
          <button class="btn btn-primary" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ================================================================
// AI 对话页面 — 使用真实 DB + AIService
// ================================================================

var chatState = {
  currentChatId: null,
  currentModel: null,
  inflightCount: 0,
  conversations: [],
  pendingFiles: []  // 待发送的附件列表 [{file, name, type}]
};

// ================================================================
// 辅助函数
// ================================================================

function chatToast(message, type) {
  type = type || 'info';
  if (window.utils && window.utils.toast) {
    window.utils.toast(message, type);
    return;
  }
  console.log('[Chat Toast]', type, message);
}

function escapeChatHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatChatTime(date) {
  var d = new Date(date);
  if (isNaN(d.getTime())) return '';
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

// ================================================================
// 初始化（由 framework.js 调用）
// ================================================================

async function initAiChatPage() {
  console.log('[AIChat] 🚀 开始初始化 AI 对话页面...');
  
  try {
    // 初始化 DB
    if (window.DB && window.DB.init) {
      await window.DB.init();
    }
    
    // 渲染模型选择器
    renderModelSelector();
    
    // 加载对话列表
    await loadChatList();
    
    // 渲染用量信息
    renderUsageInfo();
    
    // 绑定事件
    bindChatEvents();
    
    console.log('[AIChat] ✅ AI 对话页面初始化完成');
  } catch (error) {
    console.error('[AIChat] ❌ 初始化失败:', error);
    chatToast('页面初始化失败: ' + error.message, 'error');
  }
}

// ================================================================
// 模型选择器
// ================================================================

function renderModelSelector() {
  var container = document.getElementById('model-options');
  if (!container) return;
  
  var models = [];
  if (window.AIService && typeof window.AIService.getAvailableModels === 'function') {
    models = window.AIService.getAvailableModels();
  }
  
  if (models.length === 0) {
    container.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--gray-400);text-align:center;">' +
      '⚠️ 未配置模型<br><a href="#settings" style="color:var(--primary);">去设置页面配置</a>' +
      '</div>';
    return;
  }
  
  // 设置默认选中
  if (!chatState.currentModel) {
    var settings = window.AIService.getAISettings();
    chatState.currentModel = settings.defaultModelId || models[0].id;
  }
  
  container.innerHTML = models.map(function(model) {
    var isSelected = model.id === chatState.currentModel;
    return '<button class="model-option ' + (isSelected ? 'selected' : '') + '" ' +
      'onclick="selectModel(\'' + model.id + '\')" title="' + escapeChatHtml(model.description || '') + '">' +
      escapeChatHtml(model.name) +
      (model.status === 'ok' ? ' ✅' : (model.status === 'error' ? ' ❌' : '')) +
      '</button>';
  }).join('');
}

function selectModel(modelId) {
  chatState.currentModel = modelId;
  renderModelSelector();
  var models = window.AIService ? window.AIService.getAvailableModels() : [];
  var model = models.find(function(m) { return m.id === modelId; });
  chatToast('已选择 ' + (model ? model.name : modelId), 'success');
}

// ================================================================
// 对话列表
// ================================================================

async function loadChatList() {
  var list = document.getElementById('chat-list');
  if (!list) return;
  
  try {
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');
    var result = await window.DB.getChats(1, 50);
    
    chatState.conversations = result.data || [];
    
    if (chatState.conversations.length === 0) {
      list.innerHTML = '<div class="empty-state" style="text-align:center;padding:30px 20px;">' +
        '<div style="font-size:32px;margin-bottom:8px;">💬</div>' +
        '<div style="color:var(--gray-500);font-size:13px;">暂无对话</div>' +
        '<div style="color:var(--gray-400);font-size:12px;margin-top:4px;">点击「+ 新对话」开始</div>' +
        '</div>';
      return;
    }
    
    list.innerHTML = chatState.conversations.map(function(chat) {
      var isActive = chatState.currentChatId === (chat._id || chat.id);
      var title = escapeChatHtml(chat.title || '未命名对话');
      var preview = escapeChatHtml((chat.lastMessage || '暂无消息').substring(0, 40));
      var time = chat.updatedAt || chat.createdAt;
      var timeStr = time ? formatChatTime(time) : '';
      var chatId = chat._id || chat.id;
      
      return '<div class="conversation-item ' + (isActive ? 'active' : '') + '" ' +
        'onclick="selectChat(\'' + chatId + '\', \'' + title.replace(/'/g, "\\'") + '\')" ' +
        'id="chat-item-' + chatId + '" style="cursor:pointer;">' +
        '<div class="conv-icon">🤖</div>' +
        '<div class="conv-info">' +
        '<div class="conv-title">' + title + '</div>' +
        '<div class="conv-preview">' + preview + '</div>' +
        '</div>' +
        '<div class="conv-time">' + timeStr + '</div>' +
        '</div>';
    }).join('');
  } catch (error) {
    console.error('[AIChat] 加载对话列表失败:', error);
    list.innerHTML = '<div class="empty-state" style="text-align:center;padding:30px;color:var(--gray-400);">加载失败</div>';
  }
}

// ================================================================
// 创建新对话
// ================================================================

async function createNewChat() {
  try {
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');
    var result = await window.DB.createChat({ title: '新对话', model: chatState.currentModel });
    
    if (result.success) {
      var chatId = result.data ? (result.data.id || result.data._id) : null;
      if (chatId) {
        chatState.currentChatId = chatId;
        document.getElementById('chat-messages').innerHTML = '';
        document.getElementById('chat-title').textContent = '新对话';
      }
      chatToast('新对话已创建', 'success');
      await loadChatList();
    } else {
      chatToast('创建失败: ' + (result.error || '未知错误'), 'error');
    }
  } catch (error) {
    console.error('[AIChat] 创建对话失败:', error);
    chatToast('创建对话失败: ' + error.message, 'error');
  }
}

// ================================================================
// 选择对话 & 加载消息
// ================================================================

async function selectChat(chatId, title) {
  /* 参数校验 */
  if (!chatId) return;

  try {
    chatState.currentChatId = chatId;

    /* 更新 UI 选中状态 */
    document.querySelectorAll('.conversation-item').forEach(function(el) {
      el.classList.remove('active');
    });
    var item = document.getElementById('chat-item-' + chatId);
    if (item) item.classList.add('active');

    document.getElementById('chat-title').textContent = title || 'AI助手';

    await loadMessages(chatId);
  } catch (error) {
    console.error('[AIChat] 选择对话失败:', error);
    chatToast('加载对话失败: ' + error.message, 'error');
  }
}

async function loadMessages(chatId) {
  var container = document.getElementById('chat-messages');
  if (!container) return;
  
  try {
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');
    var result = await window.DB.getMessages(chatId);
    
    var messages = (result.data || []).sort(function(a, b) {
      return new Date(a.createdAt) - new Date(b.createdAt);
    });
    
    if (messages.length === 0) {
      container.innerHTML = '<div class="empty-state" style="text-align:center;padding:60px 20px;">' +
        '<div style="font-size:48px;margin-bottom:12px;">💭</div>' +
        '<div style="color:var(--gray-500);font-size:14px;">开始对话</div>' +
        '<div style="color:var(--gray-400);font-size:12px;margin-top:4px;">输入消息开始与 AI 聊天</div>' +
        '</div>';
      return;
    }
    
    container.innerHTML = messages.map(function(msg) {
      return renderMessageHtml(msg);
    }).join('');
    
    container.scrollTop = container.scrollHeight;
  } catch (error) {
    console.error('[AIChat] 加载消息失败:', error);
    container.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px;color:var(--gray-400);">加载失败</div>';
  }
}

function renderMessageHtml(msg) {
  var isUser = msg.role === 'user';
  var time = msg.createdAt ? formatChatTime(msg.createdAt) : '';

  // AI 消息：简单 markdown 渲染（代码块 + 加粗 + 换行）
  // 用户消息：转义后保留换行
  var contentHtml;
  if (isUser) {
    contentHtml = '<div style="white-space:pre-wrap;word-break:break-word;">' + escapeChatHtml(msg.content) + '</div>';
  } else {
    contentHtml = '<div class="ai-message-body" style="word-break:break-word;line-height:1.7;">' +
      renderMarkdownLite(msg.content) + '</div>';
  }

  // 附件标签（仅用于临时预览，已发送消息不含附件信息）
  var attachmentHtml = '';
  if (msg.attachments && msg.attachments.length > 0) {
    attachmentHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">' +
      msg.attachments.map(function(a) {
        return '<span style="background:rgba(255,255,255,0.2);border-radius:8px;padding:2px 8px;font-size:11px;">📎 ' +
          escapeChatHtml(a) + '</span>';
      }).join('') + '</div>';
  }

  if (isUser) {
    // 用户消息：右对齐，蓝色气泡
    return '<div class="message user" style="display:flex;align-items:flex-end;justify-content:flex-end;gap:8px;margin-bottom:18px;padding:0 8px;">' +
      '<div style="max-width:72%;order:1;">' +
        '<div style="background:var(--primary);color:#fff;' +
          'padding:10px 14px;border-radius:18px 18px 4px 18px;' +
          'box-shadow:0 1px 4px rgba(0,0,0,0.1);font-size:14px;line-height:1.6;">' +
          attachmentHtml + contentHtml +
        '</div>' +
        '<div style="font-size:11px;color:var(--gray-400);margin-top:4px;text-align:right;padding-right:2px;">' + time + '</div>' +
      '</div>' +
      '<div style="order:2;width:32px;height:32px;border-radius:50%;background:var(--primary);' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;">👤</div>' +
      '</div>';
  } else {
    // AI 消息：左对齐，浅灰气泡
    return '<div class="message assistant" style="display:flex;align-items:flex-start;gap:8px;margin-bottom:18px;padding:0 8px;">' +
      '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;">🤖</div>' +
      '<div style="max-width:72%;">' +
        '<div style="background:var(--gray-100,#f4f4f5);color:var(--gray-800,#1f2937);' +
          'padding:10px 14px;border-radius:18px 18px 18px 4px;' +
          'box-shadow:0 1px 4px rgba(0,0,0,0.06);font-size:14px;">' +
          contentHtml +
        '</div>' +
        '<div style="font-size:11px;color:var(--gray-400);margin-top:4px;padding-left:2px;">' + time + '</div>' +
      '</div>' +
      '</div>';
  }
}

// 轻量 Markdown 渲染（支持代码块、行内代码、加粗、斜体、换行、列表）
function renderMarkdownLite(text) {
  if (!text) return '';
  var html = escapeChatHtml(text);
  /* 代码块 */
  html = html.replace(/```([\w]*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre style="background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;' +
      'overflow-x:auto;font-size:13px;margin:8px 0;"><code>' + code.trim() + '</code></pre>';
  });
  /* 行内代码 */
  html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.08);padding:1px 5px;border-radius:4px;font-size:13px;">$1</code>');
  /* 加粗 */
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  /* 斜体 */
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  /* 无序列表（以 - 或 • 开头）*/
  html = html.replace(/^[-•] (.+)$/gm, '<li style="margin:2px 0;">$1</li>');
  html = html.replace(/(<li[^>]*>[\s\S]+?<\/li>)/g, '<ul style="padding-left:16px;margin:4px 0;">$1</ul>');
  /* 换行 */
  html = html.replace(/\n/g, '<br>');
  /* DOMPurify XSS 清理：防止 AI 回复中包含恶意 HTML */
  if (typeof window.DOMPurify !== 'undefined' && typeof window.DOMPurify.sanitize === 'function') {
    html = window.DOMPurify.sanitize(html);
  }
  return html;
}

// ================================================================
// 发送消息 & 获取 AI 回复
// ================================================================

async function sendMessage() {
  var input = document.getElementById('message-input');
  var content = input ? input.value.trim() : '';
  
  // 有附件时允许空文本消息（附件本身就是内容）
  if (!content && chatState.pendingFiles.length === 0) {
    chatToast('请输入消息或上传附件', 'warning');
    return;
  }
  
  if (!chatState.currentChatId) {
    chatToast('请先创建或选择一个对话', 'warning');
    return;
  }
  
  if (chatState.inflightCount >= 2) {
    chatToast('正在处理上一条消息，请稍候', 'warning');
    return;
  }
  
  // 检查模型配置
  var models = window.AIService ? window.AIService.getAvailableModels() : [];
  if (models.length === 0) {
    chatToast('请先在设置页面配置 AI 模型', 'warning');
    return;
  }

  // 收集附件信息（用于气泡展示）
  var attachmentNames = chatState.pendingFiles.map(function(f) { return f.name; });

  // ① 先清空输入框和附件区（让 UI 立即响应）
  if (input) input.value = '';
  var pendingFiles = chatState.pendingFiles.slice();
  chatState.pendingFiles = [];
  renderAttachedFiles();
  
  // ② 发送时读取附件内容
  var fileContents = '';
  if (pendingFiles.length > 0) {
    try {
      var contents = await Promise.all(pendingFiles.map(readFileContent));
      fileContents = contents.join('');
    } catch (e) {
      console.warn('[AIChat] 读取附件失败:', e);
    }
  }

  // ③ 组合最终发送内容
  var finalContent = content + fileContents;
  
  var container = document.getElementById('chat-messages');
  
  // ④ 显示用户消息（带附件标签）
  if (container) {
    container.innerHTML += renderMessageHtml({
      role: 'user',
      content: content || '（仅附件）',
      attachments: attachmentNames,
      createdAt: new Date()
    });
    container.scrollTop = container.scrollHeight;
  }
  
  // 显示 typing indicator
  if (container) {
    container.innerHTML += '<div id="typing-indicator" style="display:flex;align-items:flex-start;gap:8px;margin-bottom:18px;padding:0 8px;">' +
      '<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);' +
        'display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;">🤖</div>' +
      '<div style="background:var(--gray-100,#f4f4f5);padding:12px 16px;border-radius:18px 18px 18px 4px;">' +
      '<div class="typing-dots"><span></span><span></span><span></span></div>' +
      '</div></div>';
    container.scrollTop = container.scrollHeight;
  }
  
  chatState.inflightCount++;
  
  try {
    console.log('[AIChat] 📡 发送消息:', { chatId: chatState.currentChatId, model: chatState.currentModel, hasAttachments: pendingFiles.length > 0 });
    
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');
    var result = await window.DB.sendMessageAndReply(chatState.currentChatId, finalContent, chatState.currentModel);
    
    // 移除 typing indicator
    var typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
    
    if (result.success && result.data && result.data.reply) {
      // 显示 AI 回复
      if (container) {
        container.innerHTML += renderMessageHtml({
          role: 'assistant',
          content: result.data.reply,
          createdAt: new Date()
        });
        container.scrollTop = container.scrollHeight;
      }
      console.log('[AIChat] ✅ AI 回复成功');
    } else {
      chatToast('AI 回复失败: ' + (result.error || '未知错误'), 'error');
      // 显示错误消息
      if (container) {
        container.innerHTML += renderMessageHtml({
          role: 'assistant',
          content: '❌ 抱歉，回复失败：' + (result.error || '未知错误'),
          createdAt: new Date()
        });
        container.scrollTop = container.scrollHeight;
      }
    }
    
    // 刷新对话列表
    await loadChatList();
  } catch (error) {
    console.error('[AIChat] 发送消息失败:', error);
    var typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
    chatToast('发送失败: ' + error.message, 'error');
  } finally {
    chatState.inflightCount--;
  }
}

// ================================================================
// 删除对话
// ================================================================

async function deleteChatConfirm() {
  if (!chatState.currentChatId) {
    chatToast('请先选择一个对话', 'warning');
    return;
  }
  
  if (!confirm('确定要删除这个对话及其所有消息吗？此操作不可恢复。')) return;
  
  try {
    if (!window.DB) throw new Error('数据库服务未初始化，请检查 CloudBase 配置');
    var result = await window.DB.deleteChat(chatState.currentChatId);
    
    if (result.success) {
      chatToast('对话已删除', 'success');
      chatState.currentChatId = null;
      document.getElementById('chat-messages').innerHTML = '';
      document.getElementById('chat-title').textContent = 'AI助手';
      await loadChatList();
    } else {
      chatToast('删除失败: ' + (result.error || '未知错误'), 'error');
    }
  } catch (error) {
    console.error('[AIChat] 删除对话失败:', error);
    chatToast('删除失败', 'error');
  }
}

// ================================================================
// 导出对话
// ================================================================

function exportChat() {
  if (!chatState.currentChatId) {
    chatToast('请先选择一个对话', 'warning');
    return;
  }
  
  var container = document.getElementById('chat-messages');
  if (!container) return;
  
  // 从 DOM 提取消息文本
  var messages = container.querySelectorAll('.message');
  if (messages.length === 0) {
    chatToast('暂无消息可导出', 'warning');
    return;
  }
  
  var lines = [];
  messages.forEach(function(msgEl) {
    var isUser = msgEl.classList.contains('user');
    /* 提取消息气泡的完整文本内容（不仅限于 <pre> 标签） */
    var bubble = msgEl.querySelector('div[style*="border-radius"]');
    var msgContent = bubble ? bubble.textContent : msgEl.textContent;
    lines.push((isUser ? '我' : 'AI') + ': ' + msgContent);
  });
  
  var content = lines.join('\n\n---\n\n');
  var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '对话_' + new Date().toISOString().split('T')[0] + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  chatToast('对话已导出', 'success');
}

// ================================================================
// 文件上传（基础实现）
// ================================================================

function handleFileUpload() {
  var input = document.getElementById('file-input');
  if (input) input.click();
}

// 文件类型分类
var FILE_TYPE_SUPPORT = {
  text: ['.txt', '.md', '.csv', '.json', '.xml', '.html', '.htm', '.js', '.ts', '.py', '.java', '.cpp', '.c', '.h', '.css'],
  image: ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg'],
  doc: ['.pdf', '.doc', '.docx', '.xls', '.xlsx']
};

function getFileCategory(file) {
  var name = file.name.toLowerCase();
  if (file.type.startsWith('text/')) return 'text';
  for (var ext of FILE_TYPE_SUPPORT.text) {
    if (name.endsWith(ext)) return 'text';
  }
  for (var ext of FILE_TYPE_SUPPORT.image) {
    if (name.endsWith(ext)) return 'image';
  }
  for (var ext of FILE_TYPE_SUPPORT.doc) {
    if (name.endsWith(ext)) return 'doc';
  }
  return 'unknown';
}

function processFileUpload(event) {
  var files = event.target.files;
  if (!files || files.length === 0) return;

  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var category = getFileCategory(file);

    if (category === 'unknown') {
      chatToast('不支持的文件类型: ' + file.name, 'warning');
      continue;
    }

    // 文件大小限制 10MB
    if (file.size > 10 * 1024 * 1024) {
      chatToast('文件过大（最大 10MB）: ' + file.name, 'warning');
      continue;
    }

    chatState.pendingFiles.push({ file: file, name: file.name, category: category });
    chatToast('已添加附件: ' + file.name, 'success');
  }

  // 渲染附件预览标签
  renderAttachedFiles();

  // 重置 input 以便重复上传
  event.target.value = '';
}

function renderAttachedFiles() {
  var container = document.getElementById('attached-files');
  if (!container) return;

  if (chatState.pendingFiles.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }

  container.style.display = 'flex';
  container.style.flexWrap = 'wrap';
  container.style.gap = '6px';
  container.style.padding = '6px 0 2px';

  container.innerHTML = chatState.pendingFiles.map(function(f, idx) {
    var icon = f.category === 'image' ? '🖼️' : (f.category === 'doc' ? '📄' : '📝');
    return '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--gray-100,#f4f4f5);' +
      'border:1px solid var(--gray-200,#e4e4e7);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--gray-700,#374151);">' +
      icon + ' ' + escapeChatHtml(f.name) +
      ' <span onclick="removeAttachment(' + idx + ')" style="cursor:pointer;color:var(--gray-400);margin-left:2px;' +
      'font-size:14px;line-height:1;" title="移除">×</span>' +
      '</span>';
  }).join('');
}

function removeAttachment(idx) {
  chatState.pendingFiles.splice(idx, 1);
  renderAttachedFiles();
}

// 读取文件内容（返回 Promise<string>）
function readFileContent(fileObj) {
  return new Promise(function(resolve, reject) {
    var file = fileObj.file;
    var category = fileObj.category;

    if (category === 'image') {
      // 图片转 base64 描述（纯客户端无法 OCR，仅告知 AI 文件名）
      resolve('[图片文件: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB)]');
      return;
    }

    if (category === 'doc') {
      // PDF/Word 等二进制文件，前端无法直接解析，告知 AI 文件名和大小
      resolve('[附件: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB) — 请注意此为二进制文档格式，内容解析需后端支持]');
      return;
    }

    // 文本文件：直接读取（最多 4000 字符）
    var reader = new FileReader();
    reader.onload = function(e) {
      var content = e.target.result;
      if (content.length > 4000) {
        content = content.substring(0, 4000) + '\n... [文件内容过长，已截断至前4000字符]';
      }
      resolve('\n\n--- 附件: ' + file.name + ' ---\n' + content + '\n--- 附件结束 ---');
    };
    reader.onerror = function() {
      resolve('[附件读取失败: ' + file.name + ']');
    };
    reader.readAsText(file, 'UTF-8');
  });
}

// ================================================================
// 用量信息
// ================================================================

function renderUsageInfo() {
  var settings = window.AIService ? window.AIService.getAISettings() : {};
  var used = settings.budgetUsed || 0;
  var budget = settings.monthlyBudget || 20;
  
  var amountEl = document.getElementById('usage-amount');
  if (amountEl) amountEl.textContent = '¥' + used.toFixed(2);
  
  var budgetEl = document.getElementById('usage-budget');
  if (budgetEl) budgetEl.textContent = '预算：¥' + budget.toFixed(2);
  
  var fillEl = document.getElementById('usage-fill');
  if (fillEl) {
    var pct = budget > 0 ? Math.min(100, (used / budget) * 100) : 0;
    fillEl.style.width = pct + '%';
  }
}

// ================================================================
// 绑定事件
// ================================================================

function bindChatEvents() {
  var input = document.getElementById('message-input');
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }
}
