<div class="knowledge-page">
  <div class="page-header">
    <div class="header-title">
      <h2>知识库</h2>
      <p>整理和管理你的知识体系</p>
    </div>
    <button class="btn btn-primary" onclick="showAddKnowledgeModal()">+ 添加条目</button>
  </div>

  <!-- 分类筛选 -->
  <div class="category-tabs">
    {{mockData.knowledge.categories.map(cat => `
      <button class="category-tab ${cat === '全部' ? 'active' : ''}" onclick="filterKnowledge('${cat}')">${cat}</button>
    `).join('')}}
  </div>

  <!-- 知识条目列表 -->
  <div class="knowledge-grid">
    {{mockData.knowledge.items.map(item => `
      <div class="knowledge-card" onclick="viewKnowledge('${item.id}')">
        <div class="card-header">
          <span class="card-icon">📚</span>
          <span class="card-category">${item.category}</span>
        </div>
        <h3 class="card-title">${item.title}</h3>
        <div class="card-tags">
          ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
        </div>
        <div class="card-meta">
          <span>📅 ${item.updateAt}</span>
          <span>👁️ ${item.viewCount}</span>
          <span>❤️ ${item.likeCount}</span>
        </div>
      </div>
    `).join('')}}
  </div>

  <!-- 添加知识条目弹窗 -->
  <div class="modal" id="add-knowledge-modal" style="display: none;">
    <div class="modal-overlay" onclick="closeModal('add-knowledge-modal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加知识条目</h3>
        <button class="modal-close" onclick="closeModal('add-knowledge-modal')">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="knowledge-title" placeholder="输入知识条目标题">
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="knowledge-category">
            <option value="分布式系统">分布式系统</option>
            <option value="Go语言">Go语言</option>
            <option value="学习方法">学习方法</option>
            <option value="数据库">数据库</option>
          </select>
        </div>
        <div class="form-group">
          <label>标签（逗号分隔）</label>
          <input type="text" id="knowledge-tags" placeholder="输入标签，用逗号分隔">
        </div>
        <div class="form-group">
          <label>内容</label>
          <textarea id="knowledge-content" rows="5" placeholder="输入知识内容"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('add-knowledge-modal')">取消</button>
        <button class="btn btn-primary" onclick="addKnowledge()">添加</button>
      </div>
    </div>
  </div>
</div>

<script>
function showAddKnowledgeModal() {
  document.getElementById('add-knowledge-modal').style.display = 'block';
}

function closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

function filterKnowledge(category) {
  const tabs = document.querySelectorAll('.category-tab');
  tabs.forEach(tab => tab.classList.toggle('active', tab.textContent === category));
  
  const cards = document.querySelectorAll('.knowledge-card');
  cards.forEach(card => {
    const cardCategory = card.querySelector('.card-category').textContent;
    card.style.display = category === '全部' || cardCategory === category ? 'block' : 'none';
  });
}

function viewKnowledge(id) {
  utils.toast(`查看知识条目: ${id}`, 'info');
}

function addKnowledge() {
  const title = document.getElementById('knowledge-title').value;
  
  if (!title.trim()) {
    utils.toast('请输入标题', 'warning');
    return;
  }
  
  utils.toast('知识条目添加成功', 'success');
  closeModal('add-knowledge-modal');
}
</script>
