<div class="news-page">
  <div class="page-header">
    <div class="header-title">
      <h2>资讯动态</h2>
      <p>AI推荐的学习资讯和技术文章</p>
    </div>
    <div class="search-box">
      <input type="text" placeholder="搜索资讯..." id="news-search">
      <button class="search-btn">🔍</button>
    </div>
  </div>

  <!-- 分类筛选 -->
  <div class="category-tabs">
    {{mockData.news.categories.map(cat => `
      <button class="category-tab ${cat === '全部' ? 'active' : ''}" onclick="filterNews('${cat}')">${cat}</button>
    `).join('')}}
  </div>

  <!-- 资讯列表 -->
  <div class="news-list">
    {{mockData.news.items.map(news => `
      <div class="news-card ${news.hasRead ? 'read' : ''}" onclick="markAsRead('${news.id}')">
        <div class="news-icon">📰</div>
        <div class="news-content">
          <div class="news-header">
            <h3 class="news-title">${news.title}</h3>
            ${news.isAIRecommended ? '<span class="ai-badge">AI推荐</span>' : ''}
          </div>
          <p class="news-summary">${news.summary}</p>
          <div class="news-footer">
            <span class="news-source">${news.source}</span>
            <span class="news-date">${news.publishedAt}</span>
            <span class="news-category">${news.category}</span>
          </div>
        </div>
        <div class="news-status">
          ${news.hasRead ? '' : '<span class="unread-dot"></span>'}
        </div>
      </div>
    `).join('')}}
  </div>
</div>

<script>
function filterNews(category) {
  const tabs = document.querySelectorAll('.category-tab');
  tabs.forEach(tab => tab.classList.toggle('active', tab.textContent === category));
  
  const cards = document.querySelectorAll('.news-card');
  cards.forEach(card => {
    const cardCategory = card.querySelector('.news-category').textContent;
    card.style.display = category === '全部' || cardCategory === category ? 'flex' : 'none';
  });
}

function markAsRead(newsId) {
  const card = document.querySelector(`.news-card`);
  if (card) {
    card.classList.add('read');
    const unreadDot = card.querySelector('.unread-dot');
    if (unreadDot) unreadDot.remove();
  }
  utils.toast('已标记为已读', 'success');
}

document.getElementById('news-search').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase();
  const cards = document.querySelectorAll('.news-card');
  cards.forEach(card => {
    const title = card.querySelector('.news-title').textContent.toLowerCase();
    const summary = card.querySelector('.news-summary').textContent.toLowerCase();
    card.style.display = title.includes(query) || summary.includes(query) ? 'flex' : 'none';
  });
});
</script>
